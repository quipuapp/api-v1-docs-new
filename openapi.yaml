openapi: 3.1.0
info:
  title: Quipu API v1
  version: 1.0.0
  description: |
    REST API for Quipu invoicing and accounting software. JSON API format.
    All requests require `Accept: application/vnd.quipu.v1+json` header.

    ## Authentication
    All endpoints require a valid OAuth2 Bearer token passed via the
    `Authorization` header.

    ## Rate Limiting
    The API enforces a limit of **5 requests per 5 seconds**. Exceeding
    this limit will result in `429 Too Many Requests` responses.

    ## Format
    Request and response bodies follow the [JSON API](https://jsonapi.org/)
    specification.

    ## Pagination
    All list endpoints return paginated results. The response includes a
    `meta.pagination_info` object with `total_pages`, `current_page`, and
    `total_results`.
  x-logo:
    url: ./logo.png
    altText: Quipu
    href: https://getquipu.com
  contact:
    name: Quipu Integrations
    url: https://getquipu.com/es/integraciones
  termsOfService: https://getquipu.com/es/condiciones-de-uso

servers:
  - url: https://getquipu.com
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Users
    description: User account information
  - name: Contacts
    description: Clients and suppliers
  - name: Book Entries
    description: "Read-only listing of all book entries. The type filter accepts: invoices, paysheets, tickets."
  - name: Invoices
    description: Full invoices (income and expenses)
  - name: Tickets
    description: "**DEPRECATED** — Blocked for Verifactu accounts (returns 403). Use Simplified Invoices or Additional Income endpoints instead."
  - name: Simplified Invoices
    description: Simplified invoices
  - name: Additional Incomes
    description: "Additional income entries (simplified income documents). Always outbound (income). These entries are not subject to Verifactu."
  - name: Paysheets
    description: "Employee paysheets. Note: For paysheets, issuing_* fields refer to the company (target) and recipient_* fields refer to the employee (origin), which is reversed from other book entry types."
  - name: Numbering Series
    description: Invoice numbering series configuration
  - name: Accounting Categories
    description: Read-only accounting categories
  - name: Accounting Subcategories
    description: Accounting subcategories
  - name: Attachments
    description: File attachments for book entries

paths:
  # ── Users ──────────────────────────────────────────────────────────────
  /users/{id}:
    get:
      operationId: getUser
      summary: Show user
      tags: [Users]
      parameters:
        - $ref: "#/components/parameters/AcceptHeader"
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: User ID
      responses:
        "200":
          description: User found
          content:
            application/vnd.quipu.v1+json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserResource"
              example:
                data:
                  id: "42"
                  type: users
                  attributes:
                    email: user@example.com
                    name: Jane
                    surnames: Doe
                    locale: es
                    sign_up_draft_data: null
                    is_full_admin: false
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Contacts ───────────────────────────────────────────────────────────
  /{owner_slug}/contacts:
    get:
      operationId: listContacts
      summary: List contacts
      tags: [Contacts]
      parameters:
        - $ref: "#/components/parameters/OwnerSlug"
        - $ref: "#/components/parameters/AcceptHeader"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
        - name: filter[kind]
          in: query
          schema:
            type: string
            enum: [client, supplier, employee]
          description: Filter by contact kind
        - name: filter[tax_id]
          in: query
          schema:
            type: string
          description: Filter by tax ID
        - name: filter[country]
          in: query
          schema:
            type: string
          description: Filter by country code (comma-separated for multiple)
        - name: filter[email]
          in: query
          schema:
            type: string
          description: Filter by email address
        - name: filter[q]
          in: query
          schema:
            type: string
          description: Free-text search across contact fields
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, -name, total_paid_income, -total_paid_income, total_unpaid_income, -total_unpaid_income, total_paid_expenses, -total_paid_expenses, total_unpaid_expenses, -total_unpaid_expenses]
          description: Sort field (prefix with `-` for descending)
      responses:
        "200":
          description: Paginated list of contacts
          content:
            application/vnd.quipu.v1+json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ContactResource"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createContact
      summary: Create contact
      tags: [Contacts]
      parameters:
        - $ref: "#/components/parameters/OwnerSlug"
        - $ref: "#/components/parameters/AcceptHeader"
        - $ref: "#/components/parameters/ContentTypeHeader"
      requestBody:
        required: true
        content:
          application/vnd.quipu.v1+json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: "#/components/schemas/ContactWritable"
            example:
              data:
                type: contacts
                attributes:
                  name: Acme Corp
                  tax_id: B12345678
                  email: billing@acme.com
                  country_code: ES
      responses:
        "201":
          description: Contact created
          content:
            application/vnd.quipu.v1+json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ContactResource"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{owner_slug}/contacts/{id}:
    get:
      operationId: getContact
      summary: Show contact
      tags: [Contacts]
      parameters:
        - $ref: "#/components/parameters/OwnerSlug"
        - $ref: "#/components/parameters/AcceptHeader"
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Contact found
          content:
            application/vnd.quipu.v1+json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ContactResource"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateContact
      summary: Update contact
      tags: [Contacts]
      parameters:
        - $ref: "#/components/parameters/OwnerSlug"
        - $ref: "#/components/parameters/AcceptHeader"
        - $ref: "#/components/parameters/ContentTypeHeader"
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/vnd.quipu.v1+json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: "#/components/schemas/ContactWritable"
      responses:
        "200":
          description: Contact updated
          content:
            application/vnd.quipu.v1+json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ContactResource"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      operationId: deleteContact
      summary: Delete contact
      tags: [Contacts]
      parameters:
        - $ref: "#/components/parameters/OwnerSlug"
        - $ref: "#/components/parameters/AcceptHeader"
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Contact deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Book Entries (read-only) ───────────────────────────────────────────
  /{owner_slug}/book_entries:
    get:
      operationId: listBookEntries
      summary: List all book entries
      description: |
        Returns a paginated list of all book entries including invoices,
        tickets, simplified invoices, additional income, and paysheets.
      tags: [Book Entries]
      parameters:
        - $ref: "#/components/parameters/OwnerSlug"
        - $ref: "#/components/parameters/AcceptHeader"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
        - name: filter[type]
          in: query
          schema:
            type: string
            enum: [invoices, tickets, paysheets]
          description: Filter by entry type
        - name: filter[kind]
          in: query
          schema:
            type: string
            enum: [expenses, income]
          description: Filter by kind (expenses or income)
        - name: filter[q]
          in: query
          schema:
            type: string
          description: Free-text search
        - name: filter[period]
          in: query
          schema:
            type: string
          description: Filter by period (e.g. "2024Q1", "2024-01")
        - name: filter[payment_status]
          in: query
          schema:
            type: string
            enum: [paid, unpaid, partially_paid]
          description: Filter by payment status
        - name: filter[contact_id]
          in: query
          schema:
            type: integer
          description: Filter by contact ID
        - name: filter[validation_status]
          in: query
          schema:
            type: string
          description: Filter by validation status
        - name: filter[field_query][field]
          in: query
          schema:
            type: string
          description: Field name for field-level query filter
        - name: filter[field_query][term]
          in: query
          schema:
            type: string
          description: Search term for field-level query filter
        - name: sort
          in: query
          schema:
            type: string
            enum: [number, -number, issue_date, -issue_date, counterpart_name, -counterpart_name, total_amount, -total_amount, total_amount_without_taxes, -total_amount_without_taxes]
          description: Sort field (prefix with `-` for descending)
      responses:
        "200":
          description: Paginated list of book entries
          content:
            application/vnd.quipu.v1+json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BookEntryResource"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Invoices ───────────────────────────────────────────────────────────
  /{owner_slug}/invoices:
    get:
      operationId: listInvoices
      summary: List invoices
      tags: [Invoices]
      parameters:
