                    type: array
                    items:
                      $ref: "#/components/schemas/InvoiceResource"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createInvoice
      summary: Create invoice
      tags: [Invoices]
      parameters:
        - $ref: "#/components/parameters/OwnerSlug"
        - $ref: "#/components/parameters/AcceptHeader"
        - $ref: "#/components/parameters/ContentTypeHeader"
      requestBody:
        required: true
        content:
          application/vnd.quipu.v1+json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: "#/components/schemas/InvoiceWritable"
            example:
              data:
                type: invoices
                attributes:
                  kind: income
                  issue_date: "2024-03-15"
                  paid_at: "2024-03-20"
                  payment_method: bank_transfer
                  tags:
                    - consulting
                  notes: March consulting services
                relationships:
                  contact:
                    data:
                      id: "101"
                      type: contacts
                  numeration:
                    data:
                      id: "5"
                      type: numbering_series
                  items:
                    data:
                      - type: items
                        attributes:
                          concept: Consulting services
                          unitary_amount: "1500.00"
                          quantity: 1
                          vat_percent: 21.0
                          retention_percent: 15.0
      responses:
        "201":
          description: Invoice created
          content:
            application/vnd.quipu.v1+json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/InvoiceResource"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

