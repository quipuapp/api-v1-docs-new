# ═════════════════════════════════════════════════════════════════════════
# Components
# ═════════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: OAuth2
      description: OAuth2 Bearer token

  # ── Parameters ─────────────────────────────────────────────────────────
  parameters:
    OwnerSlug:
      name: owner_slug
      in: path
      required: true
      schema:
        type: string
      description: URL slug of the account/business owner
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Resource ID
    AcceptHeader:
      name: Accept
      in: header
      required: true
      schema:
        type: string
        const: application/vnd.quipu.v1+json
      description: Required API version accept header
    ContentTypeHeader:
      name: Content-Type
      in: header
      required: true
      schema:
        type: string
        const: application/vnd.quipu.v1+json
      description: Required content type for write operations
    PageNumber:
      name: page[number]
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-indexed)
    PageSize:
      name: page[size]
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
      description: Number of results per page

  # ── Shared Schemas ─────────────────────────────────────────────────────
  schemas:
    # ── Pagination ───────────────────────────────────────────────────────
    PaginationMeta:
      type: object
      properties:
        pagination_info:
          type: object
          properties:
            total_pages:
              type: integer
              example: 2
            current_page:
              type: integer
              example: 1
            total_results:
              type: integer
              example: 23

    # ── JSON API Relationship Link ───────────────────────────────────────
    RelationshipLinkage:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
      nullable: true

    RelationshipLinkageArray:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string

    # ── Error ────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: object
                properties:
                  pointer:
                    type: string
                    example: /data/attributes/name
              detail:
                type: string
                example: can't be blank

    # ── Item (nested resource) ───────────────────────────────────────────
    ItemAttributes:
      type: object
      description: Line item on an invoice, ticket, or simplified invoice
      properties:
        id:
          type: string
        concept:
          type: string
          description: Name / description of the line item
        unitary_amount:
          type: string
          description: Unit price as decimal string
        quantity:
          type: number
          description: Quantity
        kind:
          type: string
          description: Item kind
        vat_amount:
          type: string
          description: Calculated VAT amount
        retention_amount:
          type: string
          description: Calculated retention amount
        discount_amount:
          type: string
          description: Calculated discount amount
        deductible_vat_amount:
          type: string
          description: Deductible VAT amount
        total_amount:
          type: string
          description: Total amount for this line item
        description:
          type: string
          description: Extended description
        discount_percent:
          type: number
          description: Discount percentage
        vat_percent:
          type: number
          description: VAT percentage
        retention_percent:
          type: number
          description: Retention percentage
        deductible_vat_percent:
          type: number
          description: Deductible VAT percentage
        deductible_expense_percent:
          type: number
          description: Deductible expense percentage

    ItemWritableAttributes:
      type: object
      properties:
        concept:
          type: string
        unitary_amount:
          type: string
        quantity:
          type: number
        vat_percent:
          type: number
        retention_percent:
          type: number
        discount_percent:
          type: number
        kind:
          type: string
        description:
          type: string

    # ── Users ────────────────────────────────────────────────────────────
    UserResource:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          const: users
        attributes:
          type: object
          properties:
            email:
              type: string
              format: email
            name:
              type: string
            surnames:
              type: string
            locale:
              type: string
              example: es
            sign_up_draft_data:
              type: object
              nullable: true
            is_full_admin:
              type: boolean

    # ── Contacts ─────────────────────────────────────────────────────────
    ContactAttributes:
      type: object
      properties:
        name:
          type: string
        tax_id:
          type: string
        phone:
          type: string
        email:
          type: string
